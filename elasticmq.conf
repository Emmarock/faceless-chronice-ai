// ElasticMQ config for local SQS-compatible dev.
// Queue names mirror chronicleai.queue.* defaults in application.yaml.
// Visibility timeouts match the @SqsListener messageVisibilitySeconds (15 min)
// so a dev process killed mid-render doesn't hold messages for hours.
include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  // tells the SDK how to construct queue URLs returned to clients
  sqs-limits = strict
}

rest-stats {
  enabled = true
  bind-port = 9325
  bind-hostname = "0.0.0.0"
}

queues {
  chronicleai-dev-audio-generation {
    defaultVisibilityTimeout = 900 seconds
    deadLettersQueue {
      name = "chronicleai-dev-audio-generation-dlq"
      maxReceiveCount = 3
    }
    fifo = false
  }
  chronicleai-dev-audio-generation-dlq { fifo = false }

  chronicleai-dev-image-generation {
    defaultVisibilityTimeout = 900 seconds
    deadLettersQueue {
      name = "chronicleai-dev-image-generation-dlq"
      maxReceiveCount = 3
    }
    fifo = false
  }
  chronicleai-dev-image-generation-dlq { fifo = false }

  chronicleai-dev-video-combine {
    defaultVisibilityTimeout = 900 seconds
    deadLettersQueue {
      name = "chronicleai-dev-video-combine-dlq"
      maxReceiveCount = 3
    }
    fifo = false
  }
  chronicleai-dev-video-combine-dlq { fifo = false }

  chronicleai-dev-youtube-upload {
    defaultVisibilityTimeout = 900 seconds
    deadLettersQueue {
      name = "chronicleai-dev-youtube-upload-dlq"
      maxReceiveCount = 3
    }
    fifo = false
  }
  chronicleai-dev-youtube-upload-dlq { fifo = false }

  chronicleai-dev-tiktok-upload {
    defaultVisibilityTimeout = 900 seconds
    deadLettersQueue {
      name = "chronicleai-dev-tiktok-upload-dlq"
      maxReceiveCount = 3
    }
    fifo = false
  }
  chronicleai-dev-tiktok-upload-dlq { fifo = false }

  chronicleai-dev-twitter-upload {
    defaultVisibilityTimeout = 900 seconds
    deadLettersQueue {
      name = "chronicleai-dev-twitter-upload-dlq"
      maxReceiveCount = 3
    }
    fifo = false
  }
  chronicleai-dev-twitter-upload-dlq { fifo = false }
}

aws {
  region = eu-west-2
  accountId = 000000000000
}