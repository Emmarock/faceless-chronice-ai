# Render Blueprint — Faceless Chronicle AI backend.
#
# Render hosts only the Spring Boot compute. External dependencies
# (MySQL, S3, SQS) live elsewhere — populate the secret env vars in the
# Render dashboard before the first deploy. See DEPLOY.md / the README for
# the full provisioning checklist.
#
# Deploy: push this file, then in Render → New → Blueprint → connect repo.

services:
  - type: web
    name: faceless-chronicle-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Frankfurt is closest to AWS eu-west-2 (where the SQS queues + S3 bucket
    # live by default per terraform/), so cross-region latency stays low.
    region: frankfurt
    plan: free           # 512 MB RAM / 0.5 CPU. Bump to standard if heap pressure shows up.
    healthCheckPath: /actuator/health
    autoDeploy: true        # redeploy on push to main
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JPA_DDL_AUTO
        value: update       # auto-evolve schema on deploy; switch to "validate" once stable
      - key: AWS_REGION
        value: eu-west-2
      - key: AWS_ENDPOINT_URL
        value: ""           # empty => real AWS S3 (not MinIO)
      - key: SQS_ENDPOINT_URL
        value: ""           # empty => real AWS SQS

      # ----- Database (external MySQL provider) -----
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # ----- AWS (S3 + SQS access for an IAM user) -----
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false

      # ----- SQS queue URLs (full https://sqs.<region>.amazonaws.com/<acct>/<name>) -----
      - key: QUEUE_AUDIO_GENERATION_URL
        sync: false
      - key: QUEUE_IMAGE_GENERATION_URL
        sync: false
      - key: QUEUE_VIDEO_COMBINE_URL
        sync: false
      - key: QUEUE_YOUTUBE_UPLOAD_URL
        sync: false
      - key: QUEUE_TIKTOK_UPLOAD_URL
        sync: false
      - key: QUEUE_TWITTER_UPLOAD_URL
        sync: false
      - key: QUEUE_FACEBOOK_UPLOAD_URL
        sync: false

      # ----- AI providers -----
      - key: OPENAI_KEY
        sync: false
      - key: PEXELS_KEY
        sync: false
      - key: ELEVENLABS_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: GOOGLE_TTS_KEY
        sync: false

      # ----- Social OAuth (server-side credentials) -----
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false

      # ----- CORS (override the default allow-list if you want to lock to a specific Vercel URL) -----
      - key: CHRONICLEAI_CORS_ALLOWED_ORIGINS
        sync: false