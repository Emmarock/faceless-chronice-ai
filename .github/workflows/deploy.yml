name: Deploy

# Push to main → build, push image to ECR, roll the ECS service.
# Manual runs supported via workflow_dispatch (e.g. for hotfix re-deploys
# off a branch). The workflow is idempotent — re-running with the same
# commit SHA pushes the same image tag and forces a new ECS deployment.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'faceless-chronicle-ai' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'chronicleai' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'faceless-chronicle-ai' }}
  ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION || 'faceless-chronicle-ai' }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'app' }}

permissions:
  id-token: write   # required for AWS OIDC role assumption
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & test
        run: mvn -B -ntp verify

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Configure an IAM role for GitHub OIDC trust and put its ARN in
          # repo secret AWS_DEPLOY_ROLE_ARN. Falls back to access keys
          # (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) for repos that
          # haven't moved off long-lived creds yet.
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image URI
        id: image
        run: |
          echo "uri=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --query taskDefinition > task-definition.json

      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true