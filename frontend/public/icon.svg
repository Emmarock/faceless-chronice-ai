<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Faceless Chronicle AI">
  <defs>
    <linearGradient id="fc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1f27"/>
      <stop offset="100%" stop-color="#0a0b0e"/>
    </linearGradient>
    <linearGradient id="fc-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cb1ff"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="fc-glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fc-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square plate -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#fc-bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#fc-glow)"/>
  <rect x="0" y="0" width="512" height="220" rx="112" ry="112" fill="url(#fc-shine)"/>

  <!-- Faceless lens: outer ring -->
  <circle cx="256" cy="226" r="132" fill="none" stroke="url(#fc-accent)" stroke-width="14"/>

  <!-- Inner well to seat the play mark -->
  <circle cx="256" cy="226" r="110" fill="#0e1117"/>

  <!-- Play triangle (the "face" is the action) -->
  <path d="M 224 168 L 224 284 L 322 226 Z"
        fill="url(#fc-accent)"
        stroke="url(#fc-accent)"
        stroke-width="6"
        stroke-linejoin="round"/>

  <!-- Chronicle lines: stacked filmstrip / script bars -->
  <rect x="148" y="392" width="216" height="14" rx="7" fill="#3b82f6" opacity="0.85"/>
  <rect x="180" y="420" width="152" height="14" rx="7" fill="#3b82f6" opacity="0.55"/>
  <rect x="212" y="448" width="88"  height="14" rx="7" fill="#3b82f6" opacity="0.30"/>
</svg>